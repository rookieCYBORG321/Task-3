<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Task 3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <a href="contact.html" class="active">Contact Form</a>
    <a href="submissions.html">View Submissions</a>
</nav>

<div class="container">
    <h2>Get in Touch</h2>
    <p>Please fill out the form below to submit your details.</p>

    <form id="contactForm">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter Name">
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter Email">
        </div>

        <div class="form-group">
            <label for="message">Your Message</label>
            <textarea id="message" rows="5" placeholder="Enter Message"></textarea>
        </div>

        <button type="submit">Submit</button>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
