<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Management Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; color: #333; padding: 40px; }
        .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 2fr; gap: 30px; }
        header { grid-column: span 2; margin-bottom: 20px; background: #2c3e50; color: white; padding: 20px; border-radius: 8px; text-align: center; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); height: fit-content; }
        h3 { margin-bottom: 20px; color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #219653; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #34495e; color: white; font-weight: 600; }
        tr:hover { background-color: #f9f9f9; }
        .btn-delete { background: #e74c3c; color: white; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; width: auto; }
        .btn-delete:hover { background: #c0392b; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Contact Management Dashboard</h1>
    </header>

    <div class="card">
        <h3>Add New Contact</h3>
        <form id="contactForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" required placeholder="e.g. John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="e.g. john@example.com">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="phone" required placeholder="e.g. +123456789">
            </div>
            <div class="form-group">
                <label>Designation</label>
                <input type="text" id="designation" required placeholder="e.g. Software Developer">
            </div>
            <button type="submit">Save Contact</button>
        </form>
    </div>

    <div>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Designation</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="contactTableBody">
            </tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = '/api/contacts';

    // 1. Fetch and Display Contacts
    async function loadContacts() {
        try {
            const response = await fetch(API_URL);
            const contacts = await response.json();
            const tbody = document.getElementById('contactTableBody');
            tbody.innerHTML = '';

            contacts.forEach(contact => {
                const row = `
                    <tr>
                        <td>${contact.id}</td>
                        <td><strong>${contact.name}</strong></td>
                        <td>${contact.email}</td>
                        <td>${contact.phone}</td>
                        <td>${contact.designation}</td>
                        <td>
                            <button class="btn-delete" onclick="deleteContact(${contact.id})">Delete</button>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        } catch (error) {
            console.error('Error loading contacts:', error);
        }
    }

    // 2. Add Contact Form Submission
    document.getElementById('contactForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const contactData = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            designation: document.getElementById('designation').value
        };

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(contactData)
            });

            if (response.ok) {
                document.getElementById('contactForm').reset();
                loadContacts(); // Refresh the table
            }
        } catch (error) {
            console.error('Error saving contact:', error);
        }
    });

    // 3. Delete Contact
    async function deleteContact(id) {
        if (confirm('Are you sure you want to delete this contact?')) {
            try {
                const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    loadContacts(); // Refresh the table
                }
            } catch (error) {
                console.error('Error deleting contact:', error);
            }
        }
    }

    // Initial Load when page opens
    window.onload = loadContacts;
</script>

</body>
</html>
