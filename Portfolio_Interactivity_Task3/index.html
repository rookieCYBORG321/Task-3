<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parth Jani - Interactive Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav id="navbar">
    <div class="logo">Portfolio</div>
    <div class="nav-links">
        <a href="#home" class="nav-link active">Home</a>
        <a href="#about" class="nav-link">About</a>
        <a href="#projects" class="nav-link">Projects</a>
        <a href="#contact" class="nav-link">Contact</a>
    </div>
    <button id="themeToggle" class="toggle-btn">Dark Mode</button>
</nav>

<section id="home" class="section">
    <h1>Welcome to My Portfolio</h1>
    <p>Web Development Intern at Maincrafts Technology.</p>
</section>

<section id="about" class="section">
    <h2>About Me</h2>
    <p>Third-year student exploring modern frontend architectures and DOM manipulations.</p>
</section>

<section id="projects" class="section">
    <h2>Projects</h2>
    <div class="project-card">Project 1 - To-Do App</div>
    <div class="project-card">Project 2 - Contact Manager</div>
</section>

<section id="contact" class="section">
    <h2>Contact Me</h2>
    <div class="form-container">
        <form id="contactForm">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Enter your name">
                <span class="error-text" id="nameError"></span>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="text" id="email" placeholder="Enter your email">
                <span class="error-text" id="emailError"></span>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" rows="4" placeholder="Enter your message"></textarea>
                <span class="error-text" id="messageError"></span>
            </div>

            <button type="submit">Send Message</button>
            <div id="successMessage" class="success-text"></div>
        </form>
    </div>
</section>

<script src="script.js"></script>
</body>
</html>
